<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ作成ツール</title>
    <meta name="description" content="オリジナルのクイズを作って遊べるサイトです">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menuModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p style="font-size: 12px; color: #888; margin-bottom: 12px;">
                履歴を削除するとデータが消えるため、<br>こまめに保存してください。
            </p>
            <button id="exportBtn" class="menu-action-btn">クイズを保存する</button>
            <button id="importBtn" class="menu-action-btn">クイズを復元する</button>
            <button id="closeMenuBtn" class="menu-close-btn">閉じる</button>
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>
    </div>

    <div id="homeScreen" class="container" style="position: relative;">
        <button id="menuBtn" class="menu-btn">☰</button>
        <button id="toggleReorderBtn" style="position: absolute; top: 45px; right: 0; font-size: 16px; color: #b0b0b0; cursor: pointer; z-index: 100; padding: 3px 15px; background-color: #f7f7f7">↑↓</button>
        <h1 style="margin-top: 0px;">クイズ一覧</h1>
        
        <div id="quizList" class="quiz-list"></div>

        <button id="createNewBtn" class="fab-btn">＋</button>
    </div>

    <div id="editScreen" class="container" style="display: none;">
        <h2>クイズの編集</h2>
        <div class="edit-box">
            <label for="editTitle">タイトル</label>
            <input type="text" id="editTitle" autocomplete="off" style="width: 100%; box-sizing: border-box;" placeholder="例：英単語">
            
            <label for="editTextarea" style="margin-top: 15px;">問題と解答</label>
            <textarea id="editTextarea" rows="12" placeholder="例：&#13;&#10;win 勝つ&#13;&#10;lose 負ける 失う"></textarea>
            
            <div style="margin-bottom: 25px;">
                <label for="editFontSize" style="display: flex; justify-content: space-between;">
                    <span>問題の文字サイズ</span>
                    <span><span id="fontSizeDisplay">30</span>px</span>
                </label>
                <input type="range" id="editFontSize" min="10" max="50" value="30" style="width: 100%; margin-top: 8px;">
            </div>

            <button id="saveEditBtn" style="display: block; width: 70%; margin: 0 auto 20px; background-color: #85c1a5;">保存する</button>
            <button id="cancelEditBtn" class="secondary-btn" style="display: block; width: 70%; margin: 0 auto">キャンセル</button>
        </div>
    </div>

    <div id="quizScreen" class="container" style="display: none;">
        <h2 id="quizTitle">クイズタイトル</h2>
        
        <div id="modeSelectArea" class="quiz-box">
            <h3 style="margin: -2px 0 10px;">出題の順序</h3>
            <button id="startSequentialBtn" style="width: 100%; margin-bottom: 10px; background-color: #85c1a5;">リスト順</button>
            <button id="startRandomBtn" style="width: 100%; margin-bottom: 20px; background-color: #85c1a5;">ランダム</button>
            
            <hr style="border: none; border-top: 2px dashed #ccc; margin: 0 0 20px 0;">
            
            <button id="editQuizBtn" style="width: 100%; margin-bottom: 10px; background-color: #c5a58c;">クイズを編集</button>
            
            <button id="cancelQuizBtn" class="secondary-btn" style="width: 100%;">一覧に戻る</button>
        </div>

        <div class="quiz-box" id="quizBoxArea" style="display: none;">
            <div id="progressDisplay" class="progress-display"></div>
            
            <h3 id="question">問題</h3>

            <div id="resultStats" style="display: none; font-size: 18px; font-weight: bold; margin-bottom: 20px;">
                <p id="correctCountDisplay" style="color: #4CAF50; margin: 5px 0;"></p>
                <p id="incorrectCountDisplay" style="color: #f44336; margin: 5px 0 0;"></p>
            </div>
            
            <div id="correctAnswerDisplay" class="answer-display"></div>
            
            <input type="text" id="answerInput" autocomplete="off">
            <button id="submitBtn" style="background-color: #85c1a5;">答える</button>

            <div id="mistakeContainer" style="display: none; margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px;">
                <h4 style="margin: 10px auto 5px;">間違えた問題</h4>
                <div id="mistakeList" class="mistake-list"></div>
            </div>
        </div>
        
        <div class="controls" id="quizControls" style="display: none;">
            <button id="endQuizBtn" style="background-color: #b0b0b0; width: 70%; display: block; margin: 0 auto 20px;">クイズを終了する</button>
            <button id="restartBtn" style="display: none; background-color: #85c1a5; width: 70%; display:block; margin: 0 auto 20px;">もう一度最初から</button>
            <button id="backBtn" class="secondary-btn" style="width: 70%; display: block; margin:0 auto;">一覧に戻る</button>
        </div>
    </div>

    <div id="overlayMark"></div>

    <script src="script.js" defer></script>
</body>
</html>
