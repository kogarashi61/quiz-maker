<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>らくらくクイズメーカー</title>
    <meta name="description" content="オリジナルのクイズを作って遊べるサイト。">
    <meta name="apple-mobile-web-app-title" content="クイズメーカー">

    <meta property="og:title" content="らくらくクイズメーカー">
    <meta property="og:description" content="オリジナルのクイズを作って遊べるサイト。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kogarashi61.github.io/quiz-maker/">
    <meta property="og:image" content="https://kogarashi61.github.io/quiz-maker/quiz-maker.png">

    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="./quiz-maker-180.png">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <div id="menuModal" class="full-screen-menu" style="display: none;">
        <div class="menu-header">
            <button id="closeMenuBtn" class="icon-btn">&lt;</button>
            <span style="flex:1; text-align: center; font-weight: bold;">メニュー</span>
            <div style="width: 44px;"></div>
        </div>
        <div class="menu-body">
            
            <div id="authSection" style="width: 100%; max-width: 300px; text-align: left;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">メールアドレス</label>
                <input type="email" id="authEmail" placeholder="example@email.com" style="width: 100%; margin-bottom: 15px; padding: 8px;">
                
                <label style="display:block; margin-bottom:5px; font-weight:bold;">パスワード</label>
                <input type="password" id="authPassword" placeholder="6文字以上" style="width: 100%; margin-bottom: 25px; padding: 8px;">
                
                <button id="accountRegisterBtn" class="menu-large-btn" style="margin-bottom: 15px;">新規登録</button>
                <button id="accountLoginBtn" class="menu-large-btn" style="background-color: #fff;">ログイン</button>
            </div>

            <div id="loggedInSection" style="display: none; width: 100%; max-width: 300px; text-align: center;">
                <p id="userEmailDisplay" style="margin-bottom: 30px; font-weight: bold; color: #555;"></p>
                
                <button id="loadFromCloudBtn" class="menu-large-btn" style="background-color: #c5a58c; margin-bottom: 30px;">クラウドからデータを復元する</button>
                
                <button id="logoutBtn" class="secondary-btn" style="width: 100%; padding: 15px; border-radius: 8px;">ログアウト</button>
            </div>

        </div>
    </div>

    <div id="fullScreenEditor" style="display: none;">
        <div class="editor-header">
            <button id="cancelEditorBtn" class="icon-btn">&lt;</button>
            <span style="flex:1; text-align: center; font-weight: bold;">問題と解答</span>
            <div style="width: 44px;"></div>
        </div>
        <div class="editor-container">
            <div id="editorBg" class="editor-bg"></div>
            <textarea id="editorTextarea" class="editor-textarea" placeholder="問題と解答の間に区切り文字を入れて入力&#13;&#10;例：&#13;&#10;win 勝つ&#13;&#10;lose 負ける 失う"></textarea>
        </div>
    </div>

    <div id="homeScreen" class="container" style="position: relative;">
        <button id="menuBtn" class="menu-btn">☰</button>
        <button id="toggleReorderBtn" class="header-edit-btn" style="position: absolute; top: 36px; right: 0; z-index: 100;">編集</button>
        <h1 style="margin-top: 0;">クイズ一覧</h1>
        <div id="quizList" class="quiz-list"></div>
       
        <div id="homeActionBar" class="action-bar" style="display: none;">
            <button id="bulkDeleteQuizBtn" class="danger-btn">削除</button>
            <button id="bulkCopyQuizBtn" class="action-btn">複製</button>
        </div>
       
        <button id="createNewBtn" class="fab-btn">＋</button>
    </div>

    <div id="editScreen" class="container" style="display: none;">
        <h2>クイズの編集</h2>
        <div class="edit-box">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #333;">タイトル</label>
            <input type="text" id="editTitle" placeholder="クイズリストの名前" autocomplete="off" style="width: 100%; margin-bottom: 20px;">
           
            <label>問題と解答</label>
            <input type="text" id="editDelimiter" placeholder="区切り文字" autocomplete="off" style="width: 50%; margin-bottom: 5px;">
            <p style="font-size: 12px; color: #888; margin-top: -4px; margin-bottom: 12px;">空欄にすると全角または半角スペース区切りになります。</p>

            <button id="openEditorBtn" style="width: 100%;height: 38px; margin: 0 auto 25px; background-color: white; border-radius: 0; color:#333; border: 1px solid #333; display: flex; align-items: center; justify-content: center;">編集する</button>
           
            <div style="margin-bottom: 15px;">
                <label for="editFontSize" style="display: flex; justify-content: space-between;">
                    <span>問題の文字サイズ</span>
                    <span><span id="fontSizeDisplay">30</span>px</span>
                </label>
                <input type="range" id="editFontSize" min="10" max="50" value="30" style="width: 100%; margin-top: 8px;">
            </div>

            <div style="margin-bottom: 30px;">
                <label style="margin-bottom: 8px; display: block;">問題の配置</label>
                <div class="toggle-group" style="margin-bottom: 0;">
                    <button id="alignLeftBtn" class="toggle-btn" style="border-radius: 6px 0 0 6px;">左揃え</button>
                    <button id="alignCenterBtn" class="toggle-btn active" style="border-radius: 0;">中央揃え</button>
                    <button id="alignRightBtn" class="toggle-btn" style="border-radius: 0 6px 6px 0;">右揃え</button>
                </div>
            </div>

            <button id="saveEditBtn" class="primary-btn" style="display: block; width: 70%; margin: 40px auto 20px;">保存する</button>
            <button id="cancelEditBtn" class="secondary-btn" style="display: block; width: 70%; margin: 0 auto">キャンセル</button>
        </div>
    </div>

    <div id="quizScreen" class="container" style="display: none;">
        <h2 id="quizTitle">クイズタイトル</h2>
       
        <div id="modeSelectArea" class="quiz-box">
            <h3 style="margin: -2px 0 15px;">設定</h3>
           
            <div class="toggle-group">
                <button id="targetAllBtn" class="toggle-btn active" style="border-radius: 6px 0 0 6px;">全ての問題</button>
                <button id="targetMistakeBtn" class="toggle-btn" style="border-radius: 0 6px 6px 0;">間違えた問題</button>
            </div>
           
            <div class="toggle-group">
                <button id="orderSeqBtn" class="toggle-btn active" style="border-radius: 6px 0 0 6px;">リスト順</button>
                <button id="orderRandBtn" class="toggle-btn" style="border-radius: 0 6px 6px 0;">ランダム順</button>
            </div>

            <button id="startQuizBtn" class="primary-btn" style="width: 100%; margin-bottom: 10px;">スタート</button>
           
            <div id="resumeArea" style="display: none;">
                <hr style="border: none; border-top: 2px dashed #ccc; margin: 0 0 10px 0;">
                <button id="resumeQuizBtn" class="primary-btn" style="width: 100%; margin-bottom: 10px;">続きから</button>
            </div>
           
            <hr style="border: none; border-top: 2px dashed #ccc; margin: 0 0 10px 0;">
           
            <button id="editQuizBtn" class="accent-btn" style="width: 100%; margin-bottom: 10px;">クイズを編集</button>
            <button id="openQuestionListBtn" class="accent-btn" style="width: 100%; margin-bottom: 10px;">問題一覧</button>
            <button id="resetMistakesBtn" class="secondary-btn" style="width: 100%; margin-bottom: 10px; background-color: #e0e0e0; color: #e54444;">間違えた問題をリセット</button>
            <button id="cancelQuizBtn" class="secondary-btn" style="width: 100%;">一覧に戻る</button>
        </div>

        <div class="quiz-box" id="quizBoxArea" style="display: none;">
            <div id="progressDisplay" class="progress-display"></div>
           
            <h3 id="resultHeader" style="display: none; margin: -24px 0 4px; font-size: 24px;">結果</h3>
            <p id="resultTotalCountDisplay" style="display: none; color: #888; font-weight: bold; margin: 0 0 20px; font-size: 14px;"></p>
            <h3 id="question">問題</h3>

            <div id="resultStats" style="display: none; font-size: 18px; font-weight: bold; margin-bottom: 20px;">
                <p id="correctCountDisplay" style="color: #4CAF50; margin: 5px 0;"></p>
                <p id="incorrectCountDisplay" style="color: #f44336; margin: 5px 0 -46px;"></p>
            </div>
           
            <div id="correctAnswerDisplay" class="answer-display"></div>
           
            <input type="text" id="answerInput" autocomplete="off" style="width:80%; margin:0 auto 20px; display:block;">
            <button id="submitBtn" class="primary-btn">答える</button>

            <div id="mistakeContainer" style="display: none; margin-top: 30px; padding-top: 0px;">
                <h4 style="margin: 24px auto 10px;">間違えた問題</h4>
                <div id="mistakeList" class="mistake-list"></div>
            </div>
        </div>
       
        <div id="quizControls" style="display: none; flex-direction: column; align-items: center; gap: 15px; margin-top:20px;">
            <button id="endQuizBtn" class="secondary-btn" style="width: 70%;">クイズを終了する</button>
            <button id="restartBtn" class="primary-btn" style="display: none; width: 70%;">もう一度最初から</button>
            <button id="backBtn" class="secondary-btn" style="width: 70%;">一覧に戻る</button>
        </div>
    </div>

    <div id="questionListScreen" class="container" style="display: none; position: relative;">
        <button id="qlHeaderBackBtn" class="fixed-back-btn">&lt;</button>
       
        <div style="position: absolute; top: 38px; right: 0; z-index: 100; display: flex; gap: 6px;">
            <button id="qlFilterMistakeBtn" class="header-btn">×</button>
            <button id="qlToggleReorderBtn" class="header-edit-btn">編集</button>
        </div>
       
        <h2 style="margin-top: 0;">問題一覧</h2>
        <div id="qlList" style="margin-top: 42px;"></div>
       
        <div id="qlActionBar" class="action-bar" style="display: none;">
            <button id="bulkDeleteWordBtn" class="danger-btn">削除</button>
            <button id="bulkMoveWordBtn" class="action-btn">移動</button>
            <button id="bulkCopyMoveWordBtn" class="action-btn">複製して移動</button>
        </div>
    </div>

    <div id="moveModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 300px; width: 90%;">
            <h3 style="margin-top:0;">移動先</h3>
            <div id="moveTargetList" class="move-target-list"></div>
            <button id="closeMoveModalBtn" class="secondary-btn" style="width:70%; margin-top:20px;">キャンセル</button>
        </div>
    </div>

    <div id="singleWordEditScreen" class="container" style="display: none;">
        <h2>クイズの編集</h2>
        <div class="edit-box">
            <label>問題</label>
            <textarea id="singleQInput" class="single-edit-textarea" style="width: 100%; margin-bottom: 20px;" rows="1"></textarea>
            <label>解答</label>
            <textarea id="singleAInput" class="single-edit-textarea" style="width: 100%; margin-bottom: 30px;" rows="1"></textarea>
           
            <button id="saveSingleEditBtn" class="primary-btn" style="width: 70%; margin: 10px auto 20px; display: block;">保存する</button>
            <button id="cancelSingleEditBtn" class="secondary-btn" style="width: 70%; display: block; margin: 0 auto;">キャンセル</button>
        </div>
    </div>

    <div id="overlayMark"></div>

    <script src="script.js" defer></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBewTMsqAK-0HELbfNt6YR8IRaS9SzLQU",
            authDomain: "quiz-maker-f8c90.firebaseapp.com",
            projectId: "quiz-maker-f8c90",
            storageBucket: "quiz-maker-f8c90.firebasestorage.app",
            messagingSenderId: "147513054125",
            appId: "1:147513054125:web:10a6c826e7d29607a6c724"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // ログイン状態の監視（画面の切り替え ＋ 自動ログイン・手動ログイン時の自動データ同期）
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('loggedInSection').style.display = 'block';
                document.getElementById('userEmailDisplay').textContent = user.email + ' でログイン中';

                try {
                    // クラウド（Firestore）からデータを取ってくる
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const cloudData = docSnap.data().quizData;
                        const localData = localStorage.getItem('myQuizSets');

                        // スマホ本体のデータ（localData）が空っぽ（履歴削除直後など）の場合、またはクラウドのデータと中身が違う場合、自動的に上書きして復元します。
                        if (cloudData && cloudData !== localData) {
                            localStorage.setItem('myQuizSets', cloudData);
                            
                            // データを読み込み直して、一覧画面を即座に最新状態に書き換える
                            if (typeof loadQuizzesFromStorage === 'function' && typeof renderQuizList === 'function') {
                                loadQuizzesFromStorage();
                                renderQuizList();
                            }
                            console.log("クラウドから最新のデータを自動復元しました。");
                        }
                    }
                } catch (e) {
                    console.error("データ自動同期エラー:", e);
                }

            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('loggedInSection').style.display = 'none';
                document.getElementById('authEmail').value = '';
                document.getElementById('authPassword').value = '';
            }
        });

        // 新規登録
        document.getElementById('accountRegisterBtn').addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (!email || !password) return alert('メールアドレスとパスワードを入力してください。');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert('アカウントを作成しました！');
            } catch (error) {
                alert(`エラー: ${error.message}`);
            }
        });

        // ログイン
        document.getElementById('accountLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (!email || !password) return alert('メールアドレスとパスワードを入力してください。');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert('ログインに失敗しました。パスワード等を確認してください。');
            }
        });

        // ログアウト
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
        });

        // クラウドに保存（localStorageのデータをFirestoreに送る）
        document.getElementById('saveToCloudBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            const localData = localStorage.getItem('myQuizSets');
            if (!localData) return alert('保存するデータがありません。');
            
            try {
                const btn = document.getElementById('saveToCloudBtn');
                btn.textContent = '保存中...';
                await setDoc(doc(db, "users", currentUser.uid), {
                    quizData: localData,
                    updatedAt: new Date()
                });
                btn.textContent = 'クラウドに保存する';
                alert('クラウドへの保存が完了しました！');
            } catch (error) {
                alert('保存に失敗しました。');
                console.error(error);
            }
        });

        // クラウドから読み込み（Firestoreから取ってきてlocalStorageを上書き）
        document.getElementById('loadFromCloudBtn').addEventListener('click', async () => {
            if (!currentUser) return;
            if (!confirm('現在の端末のデータはクラウドのデータで上書きされます。よろしいですか？')) return;
            
            try {
                const btn = document.getElementById('loadFromCloudBtn');
                btn.textContent = '復元中...';
                const docSnap = await getDoc(doc(db, "users", currentUser.uid));
                
                if (docSnap.exists()) {
                    const data = docSnap.data().quizData;
                    if (data) {
                        localStorage.setItem('myQuizSets', data);
                        alert('データを復元しました！画面を更新します。');
                        window.location.reload(); // データを読み込み直すためにリロード
                    } else {
                        alert('クラウドにクイズデータがありません。');
                    }
                } else {
                    alert('クラウドに保存されたデータが見つかりません。');
                }
                btn.textContent = 'クラウドから復元する';
            } catch (error) {
                alert('復元に失敗しました。');
                console.error(error);
            }
        });

        // 外部ファイル（script.js）から呼び出せる自動保存関数
        window.syncToCloud = async (localDataString) => {
            if (!currentUser) return; // ログインしていなければ何もしない（ローカル保存のみ）
            
            try {
                // クラウドのデータベースを裏で静かに上書きする
                await setDoc(doc(db, "users", currentUser.uid), {
                    quizData: localDataString,
                    updatedAt: new Date()
                });
                console.log("クラウドへ自動保存されました");
            } catch (error) {
                console.error("自動保存エラー:", error);
            }
        };
    </script>
</body>
</html>
